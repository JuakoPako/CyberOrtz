<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberOrtz — Panel Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-3">
  <a class="navbar-brand fw-bold" href="/">🎮 CyberOrtz — Panel Admin</a>
  <a href="/" class="btn btn-outline-light">Salir</a>
</nav>

<div class="container mt-4">

  <div class="card bg-secondary text-light mb-4">
    <div class="card-header">
      <strong id="titulo-formulario">Agregar Estación</strong>
    </div>
    <div class="card-body">

      <input type="hidden" id="estacion-id">

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Nombre</label>
          <input type="text" id="input-nombre" class="form-control">
        </div>
        <div class="col-md-2">
          <label class="form-label">Tipo</label>
          <select id="input-tipo" class="form-select">
            <option value="PC">PC</option>
            <option value="Consola">Consola</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Plataforma</label>
          <input type="text" id="input-plataforma" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">Precio por hora</label>
          <input type="number" id="input-precio" class="form-control">
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-md-8">
          <label class="form-label">Descripción</label>
          <input type="text" id="input-descripcion" class="form-control">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="input-disponible" checked>
            <label class="form-check-label">Disponible</label>
          </div>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button id="btn-guardar" class="btn btn-primary">Guardar</button>
        <button id="btn-cancelar" class="btn btn-outline-light">Cancelar</button>
      </div>

    </div>
  </div>



  <table class="table table-bordered table-dark">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Plataforma</th>
        <th>Precio/hora</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="cuerpo-tabla"></tbody>
  </table>

  <h4 class="mt-5">Historial de Arriendos</h4>
<table class="table table-bordered table-dark">
  <thead>
    <tr>
      <th>ID</th>
      <th>Estación</th>
      <th>Horas</th>
      <th>Hora Inicio</th>
      <th>Hora Fin</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="cuerpo-tabla-arriendos"></tbody>
</table>
<template id="plantilla-fila-arriendo">
  <tr>
    <td class="col-arr-id"></td>
    <td class="col-arr-estacion"></td>
    <td class="col-arr-horas"></td>
    <td class="col-arr-inicio"></td>
    <td class="col-arr-fin"></td>
    <td class="col-arr-estado"></td>
    <td class="col-arr-acciones"></td>
  </tr>
</template>


</div>

<div class="modal fade" id="modal-arriendo" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light">

      <div class="modal-header">
        <h5 class="modal-title">Arrendar estación: <span id="arriendo-nombre-estacion"></span></h5>
        <button type="button" class="btn-close btn-close-white" id="btn-cancelar-arriendo"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="arriendo-estacion-id">

        <div class="mb-3">
          <label class="form-label">Horas a arrendar (máximo 12)</label>
          <input type="number" id="input-horas" class="form-control" min="1" max="12">
        </div>

        <div class="mt-3 p-3 bg-secondary rounded">
          <p class="mb-1">Subtotal: <span id="texto-subtotal">$0</span></p>
          <p class="mb-1">Iva(19%): <span id="texto-iva">$0</span></p>
          <p class="mb-0 fw-bold fs-5">total: <span id="texto-total">$0</span></p>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-light" id="btn-cancelar-arriendo-footer">Cancelar</button>
        <button type="button" class="btn btn-success" id="btn-confirmar-arriendo">Confirmar arriendo</button>
      </div>

    </div>
  </div>
</div>




<template id="plantilla-fila">
  <tr>
    <td class="col-id"></td>
    <td class="col-nombre"></td>
    <td class="col-tipo"></td>
    <td class="col-plataforma"></td>
    <td class="col-precio"></td>
    <td class="col-estado"></td>
    <td>
      <button class="btn btn-success btn-sm me-1 btn-arrendar">Arrendar</button>
      <button class="btn btn-warning btn-sm me-1 btn-editar">Editar</button>
      <button class="btn btn-danger btn-sm btn-eliminar">Eliminar</button>
    </td>
  </tr>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/panel.js"></script>
</body>
</html>
