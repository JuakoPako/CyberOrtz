<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberOrtz — Panel Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-3">
  <a class="navbar-brand fw-bold" href="/">🎮 CyberOrtz — Panel Admin</a>
  <a href="/" class="btn btn-outline-light">Salir</a>
</nav>

<div class="container mt-4">

  <div class="card bg-secondary text-light mb-4">
    <div class="card-header">
      <strong id="titulo-formulario">Agregar Estación</strong>
    </div>
    <div class="card-body">

      <input type="hidden" id="estacion-id">

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Nombre</label>
          <input type="text" id="input-nombre" class="form-control">
        </div>
        <div class="col-md-2">
          <label class="form-label">Tipo</label>
          <select id="input-tipo" class="form-select">
            <option value="PC">PC</option>
            <option value="Consola">Consola</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Plataforma</label>
          <input type="text" id="input-plataforma" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">Precio por hora</label>
          <input type="number" id="input-precio" class="form-control">
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-md-8">
          <label class="form-label">Descripción</label>
          <input type="text" id="input-descripcion" class="form-control">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="input-disponible" checked>
            <label class="form-check-label">Disponible</label>
          </div>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button id="btn-guardar" class="btn btn-primary">Guardar</button>
        <button id="btn-cancelar" class="btn btn-outline-light">Cancelar</button>
      </div>

    </div>
  </div>

  <table class="table table-bordered table-dark">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Plataforma</th>
        <th>Precio/hora</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="cuerpo-tabla"></tbody>
  </table>

</div>

<template id="plantilla-fila">
  <tr>
    <td class="col-id"></td>
    <td class="col-nombre"></td>
    <td class="col-tipo"></td>
    <td class="col-plataforma"></td>
    <td class="col-precio"></td>
    <td class="col-estado"></td>
    <td>
      <button class="btn btn-warning btn-sm me-1 btn-editar">Editar</button>
      <button class="btn btn-danger btn-sm btn-eliminar">Eliminar</button>
    </td>
  </tr>
</template>

<script src="/js/panel.js"></script>
</body>
</html>
